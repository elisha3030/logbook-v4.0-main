<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>/* Set theme class BEFORE any CSS loads to prevent flash */
        (function () { try { var t = localStorage.getItem('logbook-theme') || 'light'; var isDark = t === 'dark'; document.documentElement.classList.toggle('dark', isDark); document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'; } catch (e) { } })();
    </script>
    <title>Logbook System - Staff Login</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    <script src="/vendor/tailwindcss.js"></script>

    <script src="/js/lucide.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Toast Animations */
        .toast-item {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast-item.fade-out {
            opacity: 0;
            transform: translateX(1rem) scale(0.9);
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white font-sans min-h-screen selection:bg-blue-100 selection:text-blue-900">
    <!-- Mesh Gradient Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-100/50 blur-[120px]"></div>
        <div class="absolute top-[20%] -right-[5%] w-[35%] h-[35%] rounded-full bg-emerald-50/50 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] left-[20%] w-[45%] h-[45%] rounded-full bg-slate-100/50 blur-[120px]"></div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-6 bg-slate-50/20">
        <div class="w-full max-w-md">
            <!-- Glassmorphism Login Card -->
            <div
                class="bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-2xl shadow-blue-900/10 overflow-hidden border border-white dark:border-slate-700 relative transition-all duration-500 hover:shadow-blue-900/20">
                <div class="p-10 md:p-12">
                    <div class="text-center mb-12">
                        <div
                            class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-blue-600 to-indigo-700 text-white shadow-xl shadow-blue-900/20 mb-8 transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                            <i data-lucide="book-open" class="w-10 h-10"></i>
                        </div>
                        <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-2">Welcome Back
                        </h1>
                        <p class="text-slate-400 dark:text-slate-300 font-bold text-xs uppercase tracking-[0.2em]">
                            Engineering Staff Portal
                        </p>
                    </div>

                    <form id="loginForm" class="space-y-8">
                        <div class="space-y-2">
                            <label for="email"
                                class="block text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-300 ml-1">Staff
                                Email</label>
                            <div class="relative group">
                                <div
                                    class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-blue-500 transition-colors">
                                    <i data-lucide="mail" class="w-5 h-5"></i>
                                </div>
                                <input type="email" id="email" required
                                    class="block w-full pl-14 pr-6 py-4.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 focus:bg-white dark:focus:bg-slate-700 outline-none transition-all placeholder:text-slate-300 text-slate-700 dark:text-slate-200 font-semibold"
                                    placeholder="your@email.com">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label for="password"
                                class="block text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-300 ml-1">Secret
                                Key</label>
                            <div class="relative group">
                                <div
                                    class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-blue-500 transition-colors">
                                    <i data-lucide="lock" class="w-5 h-5"></i>
                                </div>
                                <input type="password" id="password" required
                                    class="block w-full pl-14 pr-6 py-4.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 focus:bg-white dark:focus:bg-slate-700 outline-none transition-all placeholder:text-slate-300 text-slate-700 dark:text-slate-200 font-semibold"
                                    placeholder="••••••••">
                            </div>
                        </div>

                        <div class="flex items-center justify-between px-1">
                            <div class="flex items-center">
                                <input type="checkbox" id="rememberMe"
                                    class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-slate-200 rounded-lg cursor-pointer transition-all">
                                <label for="rememberMe"
                                    class="ml-3 block text-sm text-slate-500 dark:text-slate-300 font-bold cursor-pointer select-none">
                                    Stay signed in
                                </label>
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full bg-slate-900 hover:bg-black text-white font-black py-4.5 px-6 rounded-2xl shadow-xl shadow-slate-300 transition-all flex items-center justify-center gap-3 group relative overflow-hidden">
                            <div
                                class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-700 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            </div>
                            <span id="loginSpinner"
                                class="hidden animate-spin h-5 w-5 border-3 border-white border-t-transparent rounded-full relative z-10"></span>
                            <span class="relative z-10">Login to Dashboard</span>
                            <i data-lucide="arrow-right"
                                class="w-5 h-5 group-hover:translate-x-1 transition-transform relative z-10"></i>
                        </button>

                        <div id="loginError"
                            class="hidden p-5 rounded-2xl bg-red-50 border border-red-100 text-red-600 text-sm font-bold animate-pulse-slow">
                        </div>
                    </form>

                    <div class="mt-12 pt-8 border-t border-slate-50 text-center">
                        <p class="text-[10px] text-slate-300 font-black uppercase tracking-[0.2em] mb-1">
                            Logbook System v2.0
                        </p>
                        <p class="text-[10px] text-slate-300 font-black uppercase tracking-[0.2em]">
                            Engineering Department
                        </p>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center space-y-4">
                <p
                    class="text-slate-400 text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2">
                    <i data-lucide="shield-check" class="w-4 h-4 text-emerald-500"></i>
                    Secure Enterprise Access
                </p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastContainer" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none items-end">
        <!-- Toasts will be injected here -->
    </div>

    <template id="toastTemplate">
        <div
            class="toast-item flex items-center gap-4 bg-slate-900/90 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl border border-white/10 animate-in fade-in slide-in-from-right-8 duration-300 min-w-[320px]">
            <div class="toast-icon-container p-2 rounded-xl bg-white/10">
                <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400 toast-icon"></i>
            </div>
            <div class="flex-grow">
                <p class="toast-message font-bold text-sm tracking-tight leading-tight"></p>
            </div>
        </div>
    </template>

    <script type="importmap">
        {
            "imports": {
                "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js": "/vendor/firebase/firebase-app.js",
                "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js": "/vendor/firebase/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>

</html>
